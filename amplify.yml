# AWS Amplify Hosting build spec for the Next.js (SSR / WEB_COMPUTE) app.
# Amplify auto-detects Next.js and provisions the compute for API routes,
# middleware and SSR. If deploying from the outer monorepo instead of the
# nested `prenodo` git repo, set the Amplify app root to `prenodo`.
#
# Required environment variables (set in the Amplify console, NOT here — they
# are secrets): PRENODO_DATABASE_URL, PRENODO_SESSION_SECRET, CRON_SECRET,
# and the email/SMS provider keys (SES + OpenAPI SMS). See docs/deploy-amplify.md.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
